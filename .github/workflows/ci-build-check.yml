name: CI Build Check

on:
  pull_request:
  push:
    branches:
      - main
      - master

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows-check:
    name: Test and package Windows app
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit/scaffold tests
        run: npm test

      - name: Run Electron smoke test
        run: npm run test:smoke

      - name: Build Windows package
        run: npm run package:win

      - name: Upload packaged app
        uses: actions/upload-artifact@v4
        with:
          name: thunderbolt-fighter-win32-x64
          path: "release/Thunderbolt Fighter-win32-x64"